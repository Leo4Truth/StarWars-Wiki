openapi: 3.1.0
info:
  title: StarWars Wiki MVP API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /api/v1/home/film-timeline:
    get:
      summary: 首页电影时间线
      parameters:
        - in: query
          name: locale
          required: true
          schema: { type: string, enum: [zh-CN, en-US] }
        - in: query
          name: era
          required: false
          schema: { type: string, enum: [prequel, original, sequel, anthology, all], default: all }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [film_id, slug, title, timeline_sort_key]
                      properties:
                        film_id: { type: string }
                        slug: { type: string }
                        title: { type: string }
                        era: { type: string }
                        bby_aby_label: { type: string }
                        release_date: { type: string, format: date }
                        timeline_sort_key: { type: number }
                        hover_summary: { type: string }
  /api/v1/home/beyond-films:
    get:
      summary: 首页电影外角色入口
      parameters:
        - in: query
          name: locale
          required: true
          schema: { type: string, enum: [zh-CN, en-US] }
        - in: query
          name: type
          required: false
          schema: { type: string, enum: [novel, comic, animation, game, all], default: all }
      responses:
        '200':
          description: ok
  /api/v1/films/{slug}:
    get:
      summary: 电影详情
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: query
          name: locale
          required: true
          schema: { type: string, enum: [zh-CN, en-US] }
      responses:
        '200': { description: ok }
  /api/v1/characters/{slug}:
    get:
      summary: 人物详情（含编年史）
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: query
          name: locale
          required: true
          schema: { type: string, enum: [zh-CN, en-US] }
      responses:
        '200': { description: ok }
  /api/v1/graph/subgraph:
    get:
      summary: 图谱子图
      parameters:
        - in: query
          name: entity_id
          required: true
          schema: { type: string }
        - in: query
          name: depth
          schema: { type: integer, minimum: 1, maximum: 3, default: 1 }
      responses:
        '200': { description: ok }
